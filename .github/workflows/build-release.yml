name: Build & Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.2)'
        required: true
        default: 'v1.0.2'

jobs:
  # ─── Build Android APK ──────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install & Build Web
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build
      - name: Capacitor Sync
        run: npx cap sync android
      - name: Build Android APK
        run: |
          chmod +x android/gradlew
          android/gradlew -p android assembleDebug --no-daemon 2>&1 || true
          find android -name "*.apk" -type f
          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then cp "$APK" starhub-android.apk; fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: starhub-android.apk
          if-no-files-found: warn

  # ─── Build Windows EXE ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install & Build
        run: |
          pnpm install --no-frozen-lockfile
          pnpm add -D electron@latest electron-builder@latest
          pnpm build
      - name: Compile Electron TypeScript
        shell: bash
        run: |
          npx tsc --skipLibCheck --esModuleInterop --module commonjs --target es2020 --outDir electron electron/main.ts electron/preload.ts 2>&1 || true
          ls -la electron/
      - name: Build Windows Installer
        shell: bash
        run: |
          npx electron-builder --win --config electron-builder.json 2>&1 || true
          find release -name "*.exe" -type f 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Collect artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path release -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "starhub-windows-setup.exe"; Write-Host "Found: $($exe.FullName)" }
          else { Write-Host "No EXE found in release/" }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-exe
          path: starhub-windows-setup.exe
          if-no-files-found: warn

  # ─── Build macOS DMG ────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install & Build
        run: |
          pnpm install --no-frozen-lockfile
          pnpm add -D electron@latest electron-builder@latest
          pnpm build
      - name: Compile Electron TypeScript
        run: |
          npx tsc --skipLibCheck --esModuleInterop --module commonjs --target es2020 --outDir electron electron/main.ts electron/preload.ts 2>&1 || true
          ls -la electron/
      - name: Build macOS DMG
        run: |
          npx electron-builder --mac --config electron-builder.json 2>&1 || true
          find release -name "*.dmg" -type f 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Collect artifact
        run: |
          DMG=$(find release -name "*.dmg" -type f 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then cp "$DMG" starhub-macos.dmg; echo "Found: $DMG"; fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-dmg
          path: starhub-macos.dmg
          if-no-files-found: warn

  # ─── Create GitHub Release ──────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-macos]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts/
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts"
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "星聚 ${{ steps.version.outputs.tag }}"
          body: |
            ## 星聚 ${{ steps.version.outputs.tag }}

            ### 下载安装包
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Android | starhub-android.apk | 手机版 |
            | Windows | starhub-windows-setup.exe | 桌面版 |
            | macOS | starhub-macos.dmg | 桌面版 |
            | Web | [在线访问](https://starhub.cc) | 无需下载 |

            ### 更新内容
            - 45+ 自研游戏
            - 移动端优化
            - PixiJS 8 渲染引擎
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
