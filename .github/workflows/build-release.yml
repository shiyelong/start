name: Build & Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.2)'
        required: true
        default: 'v1.0.2'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ─── Build Web (Next.js static export) ───────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: out/

  # ─── Build Android APK (Capacitor) ───────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: pnpm install
      - run: pnpm build
      - run: npx cap sync android
      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -n "$APK" ]; then cp "$APK" starhub-android.apk; fi
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: starhub-android.apk
          if-no-files-found: warn

  # ─── Build Android TV APK ───────────────────────────────────
  build-android-tv:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: pnpm install
      - run: pnpm build
      - run: npx cap sync android
      - name: Build TV APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -n "$APK" ]; then cp "$APK" starhub-androidtv.apk; fi
      - uses: actions/upload-artifact@v4
        with:
          name: androidtv-apk
          path: starhub-androidtv.apk
          if-no-files-found: warn

  # ─── Build Windows (Electron) ────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm add -D electron electron-builder
      - run: pnpm build
      - name: Build Electron (Windows)
        run: npx electron-builder --win --config electron-builder.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" -Recurse | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "starhub-windows-setup.exe" }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: starhub-windows-setup.exe
          if-no-files-found: warn

  # ─── Build macOS (Electron) ──────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm add -D electron electron-builder
      - run: pnpm build
      - name: Build Electron (macOS)
        run: npx electron-builder --mac --config electron-builder.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rename DMG
        run: |
          DMG=$(find dist -name "*.dmg" 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then cp "$DMG" starhub-macos.dmg; fi
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: starhub-macos.dmg
          if-no-files-found: warn

  # ─── Create GitHub Release ──────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-android, build-android-tv, build-windows, build-macos]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./release-assets/

      - uses: actions/download-artifact@v4
        with:
          name: androidtv-apk
          path: ./release-assets/

      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./release-assets/

      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: ./release-assets/

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "星聚 ${{ steps.version.outputs.tag }}"
          body: |
            ## 星聚 ${{ steps.version.outputs.tag }} 发布

            ### 下载
            - **Android**: starhub-android.apk (手机版)
            - **Android TV**: starhub-androidtv.apk (电视版 - 视频/漫画专用)
            - **Windows**: starhub-windows-setup.exe
            - **macOS**: starhub-macos.dmg
            - **Web**: https://starhub.cc (无需下载)

            ### 更新内容
            - 45+ 自研游戏 (棋牌/动作/益智/策略)
            - 移动端全面优化
            - 游戏全屏模式支持
            - PixiJS 8 渲染引擎
          files: |
            release-assets/starhub-android.apk
            release-assets/starhub-androidtv.apk
            release-assets/starhub-windows-setup.exe
            release-assets/starhub-macos.dmg
          draft: false
          prerelease: false
