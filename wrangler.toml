name = "start"
compatibility_date = "2024-12-01"
pages_build_output_dir = "out"

[[d1_databases]]
binding = "DB"
database_name = "test"
database_id = "cfcc5677-2d27-412e-a7ff-f49073269ccd"

[[kv_namespaces]]
binding = "KV"
id = "ad13af1682b74a2f9c872b956423401c"

# Durable Objects — deployed as a separate Worker (see workers/game-room.ts)
# To enable multiplayer, deploy the GameRoom Worker separately and uncomment:
# [durable_objects]
# bindings = [
#   { name = "GAME_ROOM", class_name = "GameRoom", script_name = "starhub-game-room" }
# ]

[[r2_buckets]]
binding = "ROMS"
bucket_name = "r2-roms"

[[r2_buckets]]
binding = "CORES"
bucket_name = "r2-cores"

[[r2_buckets]]
binding = "REPLAYS"
bucket_name = "r2-replays"

[[r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "r2-assets"

[vars]
JWT_SECRET = "starhub-jwt-secret-x7k9m2p4q8w1"
